<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savings-org</title>
  <style>
    @font-face {
      font-family: 'CooperHewitt';
      src: url('fonts/CooperHewitt-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'CooperHewitt';
      src: url('fonts/CooperHewitt-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'CooperHewitt';
      src: url('fonts/CooperHewitt-Heavy.otf') format('opentype');
      font-weight: 800;
      font-style: normal;
    }
    @font-face {
      font-family: 'Junicode';
      src: url('fonts/Junicode-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Junicode';
      src: url('fonts/Junicode-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e8e3da; font-family: 'CooperHewitt', sans-serif; min-height: 100vh; }
    input { outline: none; font-family: inherit; }
    input::placeholder { color: #444; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; }
    .del-btn { opacity: 0; transition: opacity 0.15s; }
    .goal-row:hover .del-btn { opacity: 1; }
    button { font-family: 'CooperHewitt', sans-serif; cursor: pointer; }

    /* Layout */
    #header { border-bottom: 1px solid #1e1e1e; padding: 28px 32px 20px; }
    #header h1 { font-family: 'Junicode', serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
    #header p { font-size: 11px; color: #444; margin-top: 3px; letter-spacing: 0.08em; }

    #summary { display: flex; border-bottom: 1px solid #1a1a1a; background: #111; }
    .summary-cell { flex: 1; padding: 16px 32px; border-right: 1px solid #1a1a1a; }
    .summary-cell:last-child { border-right: none; }
    .summary-label { font-size: 9px; color: #555; letter-spacing: 0.12em; margin-bottom: 5px; }
    .summary-value { font-size: 18px; font-weight: 500; }

    #goals { padding: 24px 32px 0; }

    .goal-row { border-bottom: 1px solid #1a1a1a; padding-bottom: 18px; margin-bottom: 18px; }
    .goal-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .goal-name { font-family: 'Junicode', serif; font-weight: 700; font-size: 15px; }
    .goal-meta { font-size: 12px; color: #888; display: flex; gap: 20px; margin-top: 4px; }
    .goal-actions { display: flex; gap: 8px; align-items: center; margin-left: 16px; margin-top: 2px; }
    .edit-btn { font-size: 11px; color: #555; letter-spacing: 0.06em; background: none; border: none; opacity: 0.6; transition: opacity 0.15s; }
    .progress-track { height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #2d6e44, #6ec98a); transition: width 0.4s ease; }
    .badge-done { font-size: 9px; background: #0f2a18; color: #6ec98a; padding: 2px 7px; border-radius: 2px; letter-spacing: 0.1em; margin-left: 8px; }

    #edit-form { background: #111; border: 1px solid #222; border-radius: 6px; padding: 20px 24px; margin-top: 8px; }
    .form-label { font-size: 9px; color: #555; letter-spacing: 0.1em; margin-bottom: 6px; }
    .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .form-input { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; color: #e8e3da; padding: 8px 10px; font-size: 13px; font-family: 'CooperHewitt', sans-serif; border-radius: 3px; }
    .form-actions { display: flex; gap: 10px; }
    .btn-save { background: #1e3828; border: 1px solid #2a5038; color: #6ec98a; padding: 8px 20px; font-size: 11px; letter-spacing: 0.08em; border-radius: 3px; }
    .btn-cancel { background: none; border: 1px solid #222; color: #555; padding: 8px 16px; font-size: 11px; letter-spacing: 0.08em; border-radius: 3px; }
    .btn-add { background: none; border: 1px dashed #2a2a2a; color: #444; padding: 12px 20px; font-size: 11px; letter-spacing: 0.1em; border-radius: 3px; width: 100%; margin-top: 8px; transition: all 0.15s; }
    .btn-add:hover { border-color: #3a3a3a; color: #666; }

    #monthly-section { padding: 32px 32px 0; }
    .monthly-inner { border-top: 1px solid #1a1a1a; padding-top: 24px; display: flex; align-items: center; gap: 16px; }
    .btn-apply { background: #111; border: 1px solid #2a2a2a; color: #888; padding: 10px 20px; font-size: 11px; letter-spacing: 0.1em; border-radius: 3px; }
    .btn-confirm { background: #1e3828; border: 1px solid #2a5038; color: #6ec98a; padding: 8px 16px; font-size: 11px; letter-spacing: 0.08em; border-radius: 3px; }
    .last-applied { font-size: 11px; color: #3a3a3a; }

    #notification { position: fixed; top: 18px; right: 18px; z-index: 999; padding: 10px 18px; font-size: 12px; border-radius: 4px; letter-spacing: 0.04em; display: none; }
    #notification.ok { background: #0f1f14; border: 1px solid #1e4028; color: #6ec98a; }
    #notification.err { background: #2a1010; border: 1px solid #5a2020; color: #e87070; }

    #empty { color: #333; font-size: 13px; text-align: center; padding: 48px 0; letter-spacing: 0.06em; }

    @media (max-width: 600px) {
      #header, #goals, #monthly-section { padding-left: 16px; padding-right: 16px; }
      .summary-cell { padding: 12px 16px; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .summary-value { font-size: 14px; }
    }
  </style>
</head>
<body>

<div id="header">
  <h1>SAVINGS-ORG</h1>
  <p>SAVINGS ORGANISER</p>
</div>

<div id="summary">
  <div class="summary-cell">
    <div class="summary-label">TOTAL SAVED</div>
    <div class="summary-value" id="sum-current" style="color:#c8f0d0">€0,00</div>
  </div>
  <div class="summary-cell">
    <div class="summary-label">TOTAL TARGET</div>
    <div class="summary-value" id="sum-target">€0,00</div>
  </div>
  <div class="summary-cell">
    <div class="summary-label">MONTHLY OUT</div>
    <div class="summary-value" id="sum-monthly">€0,00</div>
  </div>
</div>

<div id="goals"></div>
<div id="monthly-section" style="display:none"></div>
<div id="notification"></div>

<script>
  const API = "/api/";

  // ── State ───────────────────────────────────────────────────────────────────
  let state = { goals: [], lastApplied: null };
  let editingId = null; // null = not editing, "new" = new goal, number = existing id
  let confirmApply = false;

  // ── Utils ───────────────────────────────────────────────────────────────────
  let currency = "EUR";
  let locale = "de-DE";
  const currencyFormat = v => new Intl.NumberFormat(locale, { style: "currency", currency: currency }).format(v || 0);
  const num = s => parseFloat(String(s).replace(/[^\d.,]/g, "").replace(",", ".")) || 0;
  const uid = () => Date.now();

  function notify(msg, type = "ok") {
    const el = document.getElementById("notification");
    el.textContent = msg;
    el.className = type;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 2800);
  }

  // ── API ─────────────────────────────────────────────────────────────────────
  async function init() {
    try
    {
      const [dataRes, settingsRes] = await Promise.all([
        fetch(API + "goals"),
        fetch(API + "settings")
      ]);
      state = await dataRes.json();
      const settings = await settingsRes.json();
      currency = settings.currency ?? "EUR";
      locale = settings.locale ?? "de-DE";
    } catch {
      notify("Could not reach backend — check API address.", "err");
    }
    render();
  }

  async function persist() {
    try {
      const r = await fetch(API + "goals", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(state),
      });
      if (!r.ok) throw new Error();
    } catch {
      notify("Save failed — backend unreachable?", "err");
    }
  }

  // ── Actions ──────────────────────────────────────────────────────────────────
  function saveGoal() {
    const name = document.getElementById("f-name").value.trim();
    if (!name) { notify("Goal needs a name.", "err"); return; }
    const goal = {
      id: editingId === "new" ? uid() : editingId,
      name,
      current: num(document.getElementById("f-current").value),
      target: num(document.getElementById("f-target").value),
      monthly: num(document.getElementById("f-monthly").value),
    };
    const idx = state.goals.findIndex(g => g.id === goal.id);
    if (idx >= 0) state.goals[idx] = goal;
    else state.goals.push(goal);
    editingId = null;
    persist();
    render();
    notify("Saved.");
  }

  function deleteGoal(id) {
    state.goals = state.goals.filter(g => g.id !== id);
    persist();
    render();
    notify("Deleted.");
  }

  function applyMonthly() {
    state.goals = state.goals.map(g => ({ ...g, current: g.current + g.monthly }));
    state.lastApplied = new Date().toLocaleDateString(locale, { month: "long", year: "numeric" });
    confirmApply = false;
    persist();
    render();
    notify(`Monthly contributions applied for ${state.lastApplied}.`);
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function render() {
    const totalCurrent = state.goals.reduce((s, g) => s + g.current, 0);
    const totalTarget  = state.goals.reduce((s, g) => s + g.target,  0);
    const totalMonthly = state.goals.reduce((s, g) => s + g.monthly, 0);

    document.getElementById("sum-current").textContent = currencyFormat(totalCurrent);
    document.getElementById("sum-target").textContent  = currencyFormat(totalTarget);
    document.getElementById("sum-monthly").textContent = currencyFormat(totalMonthly);

    // Goals
    const container = document.getElementById("goals");
    container.innerHTML = "";

    if (state.goals.length === 0 && editingId === null) {
      container.innerHTML = `<div id="empty">NO GOALS YET — ADD ONE BELOW</div>`;
    }

    state.goals.forEach(g => {
      const pct = g.target > 0 ? Math.min(100, (g.current / g.target) * 100) : 0;
      const done = pct >= 100;

      const row = document.createElement("div");
      row.className = "goal-row";
      row.innerHTML = `
        <div class="goal-top">
          <div>
            <div style="display:flex;align-items:center">
              <span class="goal-name" style="color:${done ? "#6ec98a" : "#e8e3da"}">${g.name}</span>
              ${done ? `<span class="badge-done">DONE</span>` : ""}
            </div>
            <div class="goal-meta">
              <span><span style="color:#c8f0d0;font-weight:500">${currencyFormat(g.current)}</span>${g.target > 0 ? ` <span style="color:#555">/ ${currencyFormat(g.target)}</span>` : ""}</span>
              ${g.monthly > 0 ? `<span style="color:#555">+${currencyFormat(g.monthly)}/mo</span>` : ""}
              ${g.target > 0 ? `<span style="color:${done ? "#6ec98a" : "#888"}">${pct.toFixed(1)}%</span>` : ""}
            </div>
          </div>
          <div class="goal-actions">
            <button class="edit-btn" onclick="editingId=${g.id};render()">EDIT</button>
            <button class="del-btn edit-btn" style="color:#7a3030;opacity:0" onclick="deleteGoal(${g.id})">×</button>
          </div>
        </div>
        ${g.target > 0 ? `
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%;${done ? "background:#4a9e65" : ""}"></div>
          </div>` : ""}
      `;
      // hover for del button
      row.addEventListener("mouseenter", () => row.querySelectorAll(".del-btn").forEach(b => b.style.opacity = "1"));
      row.addEventListener("mouseleave", () => row.querySelectorAll(".del-btn").forEach(b => b.style.opacity = "0"));
      container.appendChild(row);

      // Inline edit form
      if (editingId === g.id) container.appendChild(buildForm(g));
    });

    // New goal form or add button
    if (editingId === "new") {
      container.appendChild(buildForm(null));
    } else {
      const btn = document.createElement("button");
      btn.className = "btn-add";
      btn.textContent = "+ ADD GOAL";
      btn.onclick = () => { editingId = "new"; render(); };
      container.appendChild(btn);
    }

    // Monthly section
    const ms = document.getElementById("monthly-section");
    if (state.goals.length === 0 || totalMonthly === 0) {
      ms.style.display = "none";
    } else {
      ms.style.display = "block";
      ms.innerHTML = `<div class="monthly-inner">
        ${confirmApply
          ? `<span style="font-size:12px;color:#888">Add ${currencyFormat(totalMonthly)} across all goals?</span>
             <button class="btn-confirm" onclick="applyMonthly()">CONFIRM</button>
             <button class="btn-cancel" onclick="confirmApply=false;render()">CANCEL</button>`
          : `<button class="btn-apply" onclick="confirmApply=true;render()">APPLY MONTHLY CONTRIBUTIONS</button>
             ${state.lastApplied ? `<span class="last-applied">Last applied: ${state.lastApplied}</span>` : ""}`
        }
      </div>`;
    }
  }

  function buildForm(g) {
    const wrap = document.createElement("div");
    wrap.id = "edit-form";
    wrap.innerHTML = `
      <div class="form-label" style="margin-bottom:16px">${g ? "EDIT GOAL" : "NEW GOAL"}</div>
      <div class="form-grid">
        <div>
          <div class="form-label">NAME</div>
          <input id="f-name" class="form-input" placeholder="e.g. Emergency fund" value="${g ? g.name : ""}" />
        </div>
        <div>
          <div class="form-label">CURRENT</div>
          <input id="f-current" class="form-input" placeholder="0" value="${g ? g.current : ""}" />
        </div>
        <div>
          <div class="form-label">TARGET</div>
          <input id="f-target" class="form-input" placeholder="optional" value="${g ? g.target : ""}" />
        </div>
        <div>
          <div class="form-label">MONTHLY</div>
          <input id="f-monthly" class="form-input" placeholder="0" value="${g ? g.monthly : ""}" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" onclick="saveGoal()">SAVE</button>
        <button class="btn-cancel" onclick="editingId=null;render()">CANCEL</button>
      </div>
    `;
    setTimeout(() => {
      const inp = wrap.querySelector("#f-name");
      if (inp) inp.focus();
      wrap.querySelectorAll("input").forEach(i => {
        i.addEventListener("keydown", e => {
          if (e.key === "Enter") saveGoal();
          if (e.key === "Escape") { editingId = null; render(); }
        });
      });
    }, 0);
    return wrap;
  }

  init();
</script>
</body>
</html>
